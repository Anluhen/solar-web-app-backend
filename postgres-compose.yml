version: '3.8'

services:
  postgres:
    image: registry-docker.weg.net/postgres:latest
    container_name: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: exampledb
volumes:
  postgres-data:
    driver: local
