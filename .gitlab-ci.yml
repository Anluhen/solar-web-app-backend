include:
  - project: 'dti/agd/templates/ci-templates-javascript'
    ref: master
    file: 'nest.yml'

variables:
  AUTOMATIC_DEPLOYMENT_ON_QA: "true"
  NODE_VERSION: "20"
  K8S_APP_PORT: "3001"

run:migrations:qa:
  stage: deploy
  image: node:$NODE_VERSION
  script:
    - npm ci --include=dev
    - npm run build
    - npm run migration:generate
    - npm run migration:verify
    - npm run migration:run
  environment: qas
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
      when: on_success

run:migrations:prd:
  stage: deploy
  image: node:$NODE_VERSION
  variables:
    NODE_ENV: production
  script:
    - npm ci --include=dev
    - npm run build
    - npm run migration:generate
    - npm run migration:verify
    - npm run migration:run
  environment: prd
  rules:
    - if: '$CI_COMMIT_TAG'
      when: on_success

deploy:qa:
  needs:
    - run:migrations:qa
  environment: qas
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
      when: on_success

deploy:prd:
  needs:
    - run:migrations:prd
  environment: prd
  rules:
    - if: '$CI_COMMIT_TAG'
      when: on_success
