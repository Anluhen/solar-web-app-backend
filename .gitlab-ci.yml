include:
  - project: 'dti/agd/templates/ci-templates-javascript'
    ref: master
    file: 'nest.yml'

variables:
  AUTOMATIC_DEPLOYMENT_ON_QA: "true"
  NODE_VERSION: "20"
  K8S_APP_PORT: "3001"

run:migrations:qa:
  stage: deploy
  image: node:$NODE_VERSION
  variables:
    NODE_ENV: quality
  script:
    - npm ci --include=dev

    # Build compiles committed migrations
    - npm run build

    # Verify migrations are compiled
    - npm run migration:verify

    # Run committed migrations first to bring DB up to date
    - npm run migration:run

    # Generate against the updated DB — expected to produce no diff
    # If a real diff exists, compile and run the new migration
    - |
      echo "Checking for remaining schema changes..."
      GENERATE_OUTPUT=$(npm run migration:generate 2>&1 || true)
      if echo "$GENERATE_OUTPUT" | grep -q "No changes in database schema"; then
        echo "✓ No schema changes detected"
      else
        echo "✓ New migration generated — compiling and running..."
        npm run build
        npm run migration:run
      fi
  environment: qas
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
      when: on_success
    - if: '$CI_COMMIT_BRANCH != "master" && $CI_COMMIT_BRANCH'
      when: manual

clear:migrations:prd:
  stage: deploy
  image: node:$NODE_VERSION
  variables:
    NODE_ENV: production
  script:
    - npm ci --include=dev
    - |
      echo "⚠️  CLEARING PRODUCTION MIGRATION TABLE"
      echo "This removes fake migrations that were marked complete but never executed"
      npm run typeorm -- query "TRUNCATE TABLE typeorm_migrations;"
      echo "✓ Migration table cleared. Run run:migrations:prd next to properly create all tables"
  environment: prd
  rules:
    - if: '$CI_COMMIT_TAG'
      when: manual

run:migrations:prd:
  stage: deploy
  image: node:$NODE_VERSION
  variables:
    NODE_ENV: production
  script:
    - npm ci --include=dev

    # Build compiles committed migrations
    - npm run build

    # Verify migrations are compiled
    - npm run migration:verify

    # Run committed migrations first to bring DB up to date
    - npm run migration:run

    # Generate against the updated DB — expected to produce no diff
    # If a real diff exists, compile and run the new migration
    - |
      echo "Checking for remaining schema changes..."
      GENERATE_OUTPUT=$(npm run migration:generate 2>&1 || true)
      if echo "$GENERATE_OUTPUT" | grep -q "No changes in database schema"; then
        echo "✓ No schema changes detected"
      else
        echo "✓ New migration generated — compiling and running..."
        npm run build
        npm run migration:run
      fi
  environment: prd
  rules:
    - if: '$CI_COMMIT_TAG'
      when: on_success

deploy:qa:
  environment: qas
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
      when: on_success
      needs:
        - run:migrations:qa
    - if: '$CI_COMMIT_BRANCH != "master" && $CI_COMMIT_BRANCH'
      when: manual
      needs:
        - run:migrations:qa

deploy:prd:
  needs:
    - run:migrations:prd
  environment: prd
  rules:
    - if: '$CI_COMMIT_TAG'
      when: on_success
