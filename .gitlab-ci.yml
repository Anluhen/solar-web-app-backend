include:
  - project: 'dti/agd/templates/ci-templates-javascript'
    ref: master
    file: 'nest.yml'

variables:
  AUTOMATIC_DEPLOYMENT_ON_QA: "true"
  NODE_VERSION: "20"
  K8S_APP_PORT: "3001"

run:migrations:
  stage: deploy
  image: node:$NODE_VERSION
  script:
    - npm ci
    - npm run build
    - npm run migration:verify
    - NODE_ENV=production npm run typeorm -- migration:run --fake
    - NODE_ENV=production npm run migration:run
  environment: qas
  rules:
    - when: on_success

deploy:qa:
  needs:
    - run:migrations
  environment: qas
  rules:
    - when: on_success

deploy:prd:
  needs:
    - run:migrations
  environment: prd
  rules:
    - when: on_success
